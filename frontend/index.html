<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Auth Container -->
        <div id="auth-container">
            <div class="card">
                <div class="header">
                    <h1 id="auth-title">Welcome Back</h1>
                    <p id="auth-subtitle">Sign in to access your ToDo list</p>
                </div>
                <form id="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="input-field" required>
                    </div>
                    <div class="form-group" id="mfa-group" style="display: none;">
                        <label for="mfa-token">MFA Token (Authenticator App)</label>
                        <input type="text" id="mfa-token" class="input-field">
                    </div>
                    <div id="auth-error" class="error-message" style="display: none;"></div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Sign In</button>
                </form>
                <div class="switch-auth" id="switch-auth-container">
                    <span id="switch-auth-text">Don't have an account? </span>
                    <span id="switch-auth-link">Sign Up</span>
                </div>
                <!-- MFA QR and Activation Container (During Registration) -->
                <div id="qr-container" class="qr-container" style="display: none; text-align: left;">
                    <p style="text-align: center; font-size: 0.9rem;">Please scan this QR code using Google Authenticator or Authy to set up MFA.</p>
                    <div style="text-align: center;">
                        <img id="qr-code-img" src="" alt="MFA QR Code">
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); text-align: center;">Secret: <span id="mfa-secret-text"></span></p>

                    <form id="activate-mfa-form" style="margin-top: 15px; width: 100%;">
                        <div class="form-group">
                            <label for="activate-mfa-token">Enter OTP to Activate</label>
                            <input type="text" id="activate-mfa-token" class="input-field" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Activate MFA</button>
                    </form>
                    <div id="activate-mfa-error" class="error-message" style="display: none; margin-top: 10px;"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard Container (Orange Theme) -->
        <div id="dashboard-container" class="dashboard-wrapper" style="display: none;">
            <!-- Orange Header Banner -->
            <div class="orange-banner">
                <div class="banner-left">
                    <h1 id="dashboard-title">Task List</h1>
                </div>
                <div class="banner-right" style="display: flex; gap: 10px; align-items: center;">
                    <button id="theme-toggle" class="white-pill-btn" style="padding: 8px 12px; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4);" aria-label="Toggle Dark Mode">🌙</button>
                    <button id="new-task-btn" class="white-pill-btn" aria-label="Create New Task">+ New</button>
                    <button id="logout-btn" class="white-pill-btn" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);" aria-label="Logout">Logout</button>
                </div>
            </div>
            
            <div class="dashboard-content">
            
            <div id="dashboard-mfa-setup" style="display: none; background: var(--bg-card); padding: 15px; border-radius: var(--radius); margin-bottom: 20px; border: 1px solid var(--primary-color);">
                <p style="margin-top: 0;"><strong>Security Recommendation:</strong> MFA is not enabled.</p>
                <form id="enable-mfa-form" style="display: flex; gap: 10px;">
                    <input type="text" id="setup-mfa-token" class="input-field" placeholder="Enter Authenticator Code" required style="margin: 0;">
                    <button type="submit" class="btn btn-primary" style="margin: 0; white-space: nowrap;">Enable MFA</button>
                </form>
                <div id="mfa-setup-error" class="error-message" style="display: none; margin-top: 10px;"></div>
                <div id="mfa-setup-success" style="display: none; color: limegreen; margin-top: 10px; font-size: 0.9rem;">MFA Successfully Enabled!</div>
            </div>

            <!-- Todo Input (Hidden by default, toggled by + New) -->
            <form id="todo-form" class="card new-task-card" style="display: none;">
                <input type="text" id="todo-input" class="input-field" placeholder="Add Your Task Name" required />
                <input type="datetime-local" id="todo-date-input" class="input-field" style="margin-top: 15px;" />
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" class="btn btn-primary">Save Task</button>
                    <button type="button" id="cancel-task-btn" class="btn cancel-btn">Cancel</button>
                </div>
            </form>

            <!-- Active Todo List -->
            <ul id="todo-list" class="todo-list"></ul>

            <!-- Completed List -->
            <h3 style="margin-top: 30px; margin-bottom: 15px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px;">Completed</h3>
            <ul id="completed-list" class="todo-list"></ul>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
