<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Auth Container -->
        <div id="auth-container" class="container">
            <div class="card">
                <div class="header">
                    <h1 id="auth-title">Welcome Back</h1>
                    <p id="auth-subtitle">Sign in to access your ToDo list</p>
                </div>
                <form id="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="input-field" required>
                    </div>
                    <div class="form-group" id="mfa-group" style="display: none;">
                        <label for="mfa-token">MFA Token (Authenticator App)</label>
                        <input type="text" id="mfa-token" class="input-field">
                    </div>
                    <div id="auth-error" class="error-message" style="display: none;"></div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Sign In</button>
                </form>
                <div class="switch-auth" id="switch-auth-container">
                    <span id="switch-auth-text">Don't have an account? </span>
                    <span id="switch-auth-link">Sign Up</span>
                </div>
                <div id="qr-container" class="qr-container" style="display: none;">
                    <p style="text-align: center; font-size: 0.9rem;">Please scan this QR code using Google Authenticator or Authy to set up MFA.</p>
                    <img id="qr-code-img" src="" alt="MFA QR Code">
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Secret: <span id="mfa-secret-text"></span></p>
                </div>
            </div>
        </div>

        <!-- Dashboard Container -->
        <div id="dashboard-container" class="container" style="display: none;">
            <div class="dashboard-header">
                <h1 id="dashboard-title">My Tasks</h1>
                <button id="logout-btn" class="btn logout-btn">Logout</button>
            </div>
            
            <!-- Todo Input -->
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" required />
                <button type="submit" class="btn btn-primary">Add</button>
            </form>

            <!-- Todo List -->
            <ul id="todo-list" class="todo-list"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
